module: subprocess
version_min: "3.0"
patterns:
  - id: "subprocess-shell-true"
    severity: "high"
    category: "security"
    cwe: "CWE-78"
    detect:
      type: "keyword"
      match: "shell=True"
    message: "shell=True passes the command through the shell — command injection risk if any part of the command includes user input. Use a list of arguments instead: subprocess.run(['cmd', 'arg'], shell=False)."
    docs: "https://docs.python.org/3/library/subprocess.html#security-considerations"

  - id: "subprocess-os-system"
    severity: "high"
    category: "security"
    cwe: "CWE-78"
    detect:
      type: "pattern"
      match: "os\\.system\\("
    message: "os.system() passes commands through the shell and is a security risk. Use subprocess.run() with a list of arguments and shell=False instead."
    docs: "https://docs.python.org/3/library/os.html#os.system"

  - id: "subprocess-no-timeout"
    severity: "warning"
    category: "bug"
    detect:
      type: "function_call_missing_arg"
      functions:
        - "subprocess.run"
        - "subprocess.call"
        - "subprocess.check_output"
        - "subprocess.check_call"
      missing_arg: "timeout"
    message: "subprocess call without a timeout can hang indefinitely if the process does not respond. Add timeout=30 (or an appropriate value) to prevent deadlocks."
    docs: "https://docs.python.org/3/library/subprocess.html#subprocess.run"

  - id: "subprocess-popen-no-timeout"
    severity: "warning"
    category: "bug"
    detect:
      type: "function_call_missing_arg"
      function: "subprocess.Popen"
      missing_arg: "timeout"
    message: "subprocess.Popen().communicate() should have a timeout. Without one, it can hang forever if the child process blocks. Use .communicate(timeout=30)."
