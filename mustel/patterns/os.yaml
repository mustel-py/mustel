module: os
version_min: "3.0"
patterns:
  - id: "os-system-call"
    severity: "high"
    category: "security"
    cwe: "CWE-78"
    detect:
      type: "pattern"
      match: "os\\.system\\("
    message: "os.system() passes commands through the shell. If any part of the command includes user input, this is a command injection vulnerability. Use subprocess.run(['cmd', 'arg'], shell=False) instead."
    docs: "https://docs.python.org/3/library/os.html#os.system"

  - id: "os-path-join-user-input"
    severity: "medium"
    category: "security"
    cwe: "CWE-22"
    detect:
      type: "pattern"
      match: "os\\.path\\.join\\(.*request|os\\.path\\.join\\(.*input\\(|os\\.path\\.join\\([^,\\)]+,\\s*[a-zA-Z_][a-zA-Z0-9_]*(name|path|file|dir|filename|filepath)\\s*\\)|os\\.path\\.join\\([^,\\)]+,\\s*[a-zA-Z_][a-zA-Z0-9_]*\\s*\\)"
    message: "os.path.join() called with potentially user-controlled input — path traversal risk. Validate and sanitize the user input, or use pathlib.Path and check that the resolved path stays within the expected directory."
    docs: "https://owasp.org/www-community/attacks/Path_Traversal"

  - id: "os-makedirs-no-exist-ok"
    severity: "warning"
    category: "bug"
    detect:
      type: "function_call_missing_arg"
      function: "os.makedirs"
      missing_arg: "exist_ok"
    message: "os.makedirs() without exist_ok=True will raise FileExistsError if the directory already exists. Use os.makedirs(path, exist_ok=True) for idempotent directory creation."

  - id: "os-popen"
    severity: "high"
    category: "security"
    cwe: "CWE-78"
    detect:
      type: "pattern"
      match: "os\\.popen\\("
    message: "os.popen() is deprecated and executes commands through the shell. Use subprocess.run() with a list of arguments and communicate() to capture output safely."
    docs: "https://docs.python.org/3/library/os.html#os.popen"
