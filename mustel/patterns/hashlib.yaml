module: hashlib
version_min: "3.0"
patterns:
  - id: "hashlib-md5"
    severity: "medium"
    category: "security"
    cwe: "CWE-327"
    detect:
      type: "pattern"
      match: "hashlib\\.md5\\(|hashlib\\.new\\(['\"]md5['\"]"
    message: "MD5 is a cryptographically broken hash algorithm. Do not use it for passwords, signatures, or security-sensitive data. Use hashlib.sha256() or hashlib.sha3_256() instead."
    docs: "https://docs.python.org/3/library/hashlib.html"

  - id: "hashlib-sha1"
    severity: "medium"
    category: "security"
    cwe: "CWE-327"
    detect:
      type: "pattern"
      match: "hashlib\\.sha1\\(|hashlib\\.new\\(['\"]sha1['\"]"
    message: "SHA-1 is deprecated for security usage — collision attacks are practical. Use hashlib.sha256() or hashlib.sha3_256() for security-critical hashing."
    docs: "https://docs.python.org/3/library/hashlib.html"

  - id: "hashlib-no-usedforsecurity"
    severity: "warning"
    category: "security"
    cwe: "CWE-327"
    detect:
      type: "pattern"
      match: "hashlib\\.md5\\(|hashlib\\.sha1\\("
    message: "If using MD5 or SHA-1 for non-security purposes (e.g. checksums), add usedforsecurity=False to suppress warnings and clarify intent: hashlib.md5(data, usedforsecurity=False)."
