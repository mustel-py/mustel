name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mustel
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run mustel version
        run: mustel --version

      - name: Run mustel review on test projects
        run: |
          mustel review tests/test_projects/project_auth --no-packages --pretty
          mustel review tests/test_projects/project_async --no-packages --pretty
          mustel review tests/test_projects/project_scraper --no-packages --pretty
          mustel review tests/test_projects/project_clean --no-packages --pretty

      - name: Verify clean project is clean
        run: |
          python -c "
          from mustel.runner import run_review
          report = run_review(path='tests/test_projects/project_clean', skip_packages=True)
          assert report.is_clean, f'project_clean should be clean but found issues: {report.agent_prompt}'
          print('project_clean: PASSED (zero issues)')
          "

      - name: Run mustel env
        run: mustel env --pretty
